<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Manager Bot</title>
<style>
  :root{--bg:#0f1115;--card:#171a21;--accent:#4f7cff;--text:#e8eaed;--muted:#8a8f98;--border:#262a33;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}
  .container{max-width:960px;margin:0 auto;padding:24px 16px;}
  .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px;}
  .btn{background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600;}
  .btn:hover{opacity:.9;}
  .btn.secondary{background:var(--card);border:1px solid var(--border);color:var(--text);}
  .btn.danger{background:#e5484d;}
  h1{font-size:22px;margin-bottom:4px;}
  h2{font-size:16px;margin:20px 0 10px;color:var(--muted);}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
  .page-item{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .page-item:hover{background:#1d2029;}
  input,textarea,select{width:100%;background:#0f1115;border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;margin-bottom:8px;font-size:14px;}
  label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}
  .row{display:flex;gap:8px;}
  .row>div{flex:1;}
  .rule-item, .post-item{border-bottom:1px solid var(--border);padding:10px 0;}
  .rule-item:last-child, .post-item:last-child{border-bottom:none;}
  .tag{display:inline-block;background:#22262f;padding:2px 8px;border-radius:4px;font-size:11px;color:var(--muted);margin-right:6px;}
  .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .tabs{display:flex;gap:4px;margin-bottom:16px;}
  .tab{padding:8px 16px;border-radius:6px;cursor:pointer;color:var(--muted);}
  .tab.active{background:var(--card);color:var(--text);}
  .hidden{display:none;}
  .muted{color:var(--muted);font-size:13px;}
  .badge-status{font-size:11px;padding:2px 6px;border-radius:4px;}
  .badge-posted{background:#1a3a2a;color:#4ade80;}
  .badge-pending{background:#3a2f1a;color:#facc15;}
  .badge-failed{background:#3a1a1a;color:#f87171;}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen hidden">
  <h1>Page Manager Bot</h1>
  <p class="muted">Facebook Page auto-reply & post scheduler</p>
  <button class="btn" onclick="loginWithFacebook()">Login with Facebook</button>
</div>

<div id="appScreen" class="container hidden">
  <div class="top-bar">
    <h1>Page Manager Bot</h1>
    <button class="btn secondary" onclick="logout()">Logout</button>
  </div>

  <div id="pageListView">
    <h2>Your Pages</h2>
    <div id="pagesContainer" class="card"><p class="muted">Loading...</p></div>
  </div>

  <div id="pageDetailView" class="hidden">
    <button class="btn secondary" onclick="backToPages()" style="margin-bottom:12px;">&larr; Back</button>
    <h1 id="detailPageName"></h1>

    <div class="tabs">
      <div class="tab active" data-tab="rules" onclick="switchTab('rules')">Auto-Reply Rules</div>
      <div class="tab" data-tab="posts" onclick="switchTab('posts')">Scheduled Posts</div>
      <div class="tab" data-tab="logs" onclick="switchTab('logs')">Logs</div>
    </div>

    <div id="tab-rules">
      <div class="card">
        <h2 style="margin-top:0;">Notun Rule</h2>
        <div class="row">
          <div>
            <label>Match Type</label>
            <select id="ruleMatchType">
              <option value="contains">Comment e keyword thakle</option>
              <option value="exact">Exact match</option>
              <option value="any">Sob comment e (catch-all)</option>
            </select>
          </div>
          <div>
            <label>Priority (boro number age check hobe)</label>
            <input id="rulePriority" type="number" value="0">
          </div>
        </div>
        <label>Keyword</label>
        <input id="ruleKeyword" placeholder="e.g. price, দাম, cost">
        <label>Public Comment Reply (comment er niche reply)</label>
        <textarea id="ruleCommentReply" rows="2" placeholder="Inbox check korun..."></textarea>
        <label>Inbox (DM) Text</label>
        <textarea id="ruleInboxText" rows="2" placeholder="Assalamu Alaikum! ..."></textarea>
        <label>Inbox Image URL (optional)</label>
        <input id="ruleInboxImage" placeholder="https://.../image.jpg">
        <button class="btn" onclick="saveRule()">Save Rule</button>
      </div>
      <h2>Existing Rules</h2>
      <div id="rulesContainer" class="card"><p class="muted">Loading...</p></div>
    </div>

    <div id="tab-posts" class="hidden">
      <div class="card">
        <h2 style="margin-top:0;">Notun Post Schedule Korun</h2>
        <label>Message</label>
        <textarea id="postMessage" rows="3" placeholder="Post text..."></textarea>
        <label>Image URL (optional)</label>
        <input id="postImage" placeholder="https://.../image.jpg">
        <label>Schedule Time</label>
        <input id="postTime" type="datetime-local">
        <button class="btn" onclick="createPost()">Schedule Post</button>
      </div>
      <h2>Scheduled / Posted</h2>
      <div id="postsContainer" class="card"><p class="muted">Loading...</p></div>
    </div>

    <div id="tab-logs" class="hidden">
      <h2>Recent Reply Activity</h2>
      <div id="logsContainer" class="card"><p class="muted">No logs yet.</p></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
